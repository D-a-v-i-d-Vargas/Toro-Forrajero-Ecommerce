<!DOCTYPE html>
<html lang="es">

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Contáctanos</title>

	<!--Bootstrap 5.3-->
	<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
		integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">

	<!--Bootstrap para los iconos -->
	<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

	<!--Fuentes-->
	<link rel="preconnect" href="https://fonts.googleapis.com">
	<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
	<link
		href="https://fonts.googleapis.com/css2?family=Geologica:wght@400;700&family=Montserrat:wght@400;700&display=swap"
		rel="stylesheet">

	<!--CSS-->
	<link rel="stylesheet" href="style.css">

</head>

<body>
	<!-- Sección "formulario" -->
	<section id="formulario">
		<div class="container py-5">
			<div class="row justify-content-center">
			
			<!-- COLUMNA PRINCIPAL -->
			<div class="col-12 col-md-8 col-lg-6">
				
				<!-- TARJETA CON BORDE -->
				<div class="contact-card p-4 p-md-5 border border-3 border-warning-subtle rounded-4 shadow-sm">
				
					<form id="formContacto" novalidate>
						
						<!-- Nombre y Teléfono -->
						<div class="row g-3 mb-3">
							<!-- Nombre -->
							<div class="col-md-7">
								<label for="nombre" class="form-label-custom fw-bold text-center w-100">Nombre</label>
								<input type="text" id="nombre" name="nombre" class="form-control form-control-custom w-100" placeholder="Escribe tu nombre">
								<div id="error-nombre" class="text-danger small mt-1 text-center"></div>
							</div>

							<!-- Teléfono -->
							<div class="col-md-5">
								<label for="telefono" class="form-label-custom fw-bold text-center w-100">Teléfono</label>
								<input type="tel" id="telefono" name="telefono" class="form-control form-control-custom w-100" placeholder="(+52)">
								<div id="error-telefono" class="text-danger small mt-1 text-center"></div>
							</div>
						</div>

						<!-- Correo electrónico -->
						<div class="mb-3">
							<label for="correo" class="form-label-custom fw-bold text-center w-100">Correo electrónico</label>
							<input type="email" id="correo" name="correo" class="form-control form-control-custom text-center w-100" placeholder="correoelectronico@correodeejemplo.net">
							<div id="error-correo" class="text-danger small mt-1 text-center"></div>
						</div>

						<!-- Fecha -->
						<div class="mb-4 text-center">
							<label for="fecha" class="form-label-custom fw-bold mb-2">¿Cuándo te podemos contactar?</label>
							<input type="date" id="fecha" name="fecha" class="form-control form-control-custom text-center w-100">
							<div id="error-fecha" class="text-danger small mt-1 text-center"></div>
						</div>

						<!-- Horario en Lapso -->
						<div class="mb-4 text-center">
							<label class="form-label-custom fw-bold mb-1">¿En qué horario te es más cómodo?</label>
							<p class="text-muted small mb-2">(Horario de atención: 8:00 a.m. a 8:00 p.m.)</p>
							
							<div class="p-2 bg-white rounded-4 border d-flex justify-content-center align-items-center gap-1 gap-sm-2 shadow-sm">
								<!-- Hora de Inicio -->
								<input type="time" id="hora-inicio" name="hora_inicio" class="form-control border-0 text-center fw-bold bg-transparent px-1" value="08:00"min="08:00" max="20:00" style="max-width: 165px;">
								<span class="fw-bold text-muted fs-5">-</span>
								<!-- Hora de Fin -->
								<input type="time" id="hora-fin" name="hora_fin" class="form-control border-0 text-center fw-bold bg-transparent px-1" value="20:00" min="08:00" max="20:00" style="max-width: 165px;">
							</div>
							<div id="error-hora" class="text-danger small mt-1 text-center"></div>
						</div>	

						<!-- Quejas o sugerencias -->
						<div class="mb-4">
							<label for="comentarios" class="form-label-custom fw-bold text-center w-100">Quejas o sugerencias</label>
							<textarea id="comentarios" name="comentarios" class="form-control form-control-custom w-100" rows="4" placeholder="Escribe tus comentarios"></textarea>
							<div id="error-comentarios" class="text-danger small mt-1 text-center"></div>
						</div>

						<!-- Botón Enviar -->
						<div class="mt-4 pt-2">
							<button type="submit" id="btnEnviar" class="btn btn-dark w-100 fw-bold py-2">Enviar</button>
						</div>
					</form>
				</div>
			</div>
		</div>
	</section> 

	<!--Bootstrap script-->
	<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
		integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
		crossorigin="anonymous"></script>

	<!--Script de js-->
	<script src="script.js"></script>
</body>

</html>
