<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acerca de Nosotros</title>

    <!--Bootstrap-->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">

    <!--Fuentes-->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Geologica:wght@400;700&family=Montserrat:wght@400;700&display=swap"
        rel="stylesheet">

    <!--CSS-->
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <!--Header, barras de nav, herro---------------------------------------------------------------->
    <header>
        <nav id="nav1">

        </nav>

        <nav id="nav2">

        </nav>

        <section id="herro">

        </section>
    </header>

    <!--Acerca de nosotros------------------------------------------------------------------------>
    <section id="AcercaNosotros">

    </section>

    <!--Quienes somos------------------------------------------------------------------------>
    <section id="quienesSomos">

    </section>

    <!--Cultura que nos distingue------------------------------------------------------------------------>
    <section id="culturaDistingue">

    </section>

    <!--Quiénes lo hacen posible------------------------------------------------------------------------>
    <section class="seccion-equipo-forrajero">
        <div class="container-fluid">

            <!-- 1. El Carrusel de Imágenes-->
            <div id="carruselForrajero" class="carousel slide carousel-fade shadow-sm m-0" data-bs-ride="carousel" data-bs-interval="3000">

                <!-- Indicadores -->
                <div class="carousel-indicators">
                    <button type="button" data-bs-target="#carruselForrajero" data-bs-slide-to="0" class="active" aria-current="true" aria-label="Slide 1"></button>
                    <button type="button" data-bs-target="#carruselForrajero" data-bs-slide-to="1" aria-label="Slide 2"></button>
                    <button type="button" data-bs-target="#carruselForrajero" data-bs-slide-to="2" aria-label="Slide 3"></button>
                </div>

                <!-- Imagen (Señor y las vacas) -->
                <div class="carousel-inner">
                    <div class="carousel-item active">
                        <img src="./img/pexels-juanjosedz-5565064.jpg" class="d-block w-100" alt="Imagen1">
                    </div>
                    <div class="carousel-item">
                        <img src="./img/pexels-lukas-kosc-525097851-30649988.jpg" class="d-block w-100" alt="Imagen2">
                    </div>
                    <div class="carousel-item">
                        <img src="./img/pexels-tkirkgoz-11536891.jpg" class="d-block w-100" alt="Imagen3">
                    </div>
                </div>

                <!-- Flechas de Control -->
                <button class="carousel-control-prev" type="button" data-bs-target="#carruselForrajero" data-bs-slide="prev">
                    <span class="carousel-control-prev-icon" aria-hidden="true"></span>
                    <span class="visually-hidden">Anterior</span>
                </button>
                <button class="carousel-control-next" type="button" data-bs-target="#carruselForrajero" data-bs-slide="next">
                    <span class="carousel-control-next-icon" aria-hidden="true"></span>
                    <span class="visually-hidden">Siguiente</span>
                </button>
            </div>
        </div>
    </section>

    <!--Footer------------------------------------------------------------------------>
    <footer>

    </footer>

    <!--Bootstrap script-->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>

    <!--Script de js-->
    <script src="script.js"></script>
</body>

</html>
